{% extends "base.html" %}
{% block title %}Editar habitación{% endblock %}
{% block content %}
<section class="form-card">
  <h1>Editar habitación {{ room.room_number }}</h1>
  <form method="post" class="formulario">
    <label>Número
      <input type="number" name="room_number" min="1" step="1" inputmode="numeric" value="{{ room.room_number }}" required>
    </label>
    <label>Tipo
      <select name="room_type">
        <option value="single" {% if room.room_type == 'single' %}selected{% endif %}>Sencilla</option>
        <option value="double" {% if room.room_type == 'double' %}selected{% endif %}>Doble</option>
        <option value="suite" {% if room.room_type == 'suite' %}selected{% endif %}>Suite</option>
        <option value="family" {% if room.room_type == 'family' %}selected{% endif %}>Familiar</option>
      </select>
    </label>
    <label>Piso
      <input type="number" name="floor" min="1" value="{{ room.floor }}" required>
    </label>
    <label>Precio por noche
      <input type="number" step="0.01" min="0.01" name="price_per_night" value="{{ room.price_per_night }}" required>
    </label>
    <label>Capacidad
      <input type="number" min="1" name="capacity" value="{{ room.capacity }}" required>
    </label>
    <label>Descripción
      <textarea name="description">{{ room.description or '' }}</textarea>
    </label>
    <label>Estado
      <select name="status">
        <option value="available" {% if room.status == 'available' %}selected{% endif %}>Disponible</option>
        <option value="occupied" {% if room.status == 'occupied' %}selected{% endif %}>Ocupada</option>
        <option value="cleaning" {% if room.status == 'cleaning' %}selected{% endif %}>Limpieza</option>
        <option value="maintenance" {% if room.status == 'maintenance' %}selected{% endif %}>Mantenimiento</option>
      </select>
    </label>
    <button type="submit">Guardar cambios</button>
  </form>
</section>
{% endblock %}
